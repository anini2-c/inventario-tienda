<!DOCTYPE html>
<html>
<head>
    <title>Inventario PRO</title>
<head>
    <title>Inventario PRO</title>

    <style>
    body {
        font-family: Arial;
        background: #f4f6f9;
        text-align: center;
    }

    h1 {
        color: #e53935;
    }

    input {
        padding: 10px;
        margin: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background-color: #e53935;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background-color: #c62828;
    }

    table {
        margin: auto;
        border-collapse: collapse;
        width: 80%;
        background: white;
        border-radius: 10px;
        overflow: hidden;
    }

    th {
        background-color: #e53935;
        color: white;
        padding: 10px;
    }

    td {
        padding: 10px;
    }

    tr:nth-child(even) {
        background-color: #f2f2f2;
    }
    </style>
</head>
<body>

<h1>Inventario de la tienda</h1>

<input type="text" id="producto" placeholder="Producto">
<input type="number" id="cantidad" placeholder="Cantidad">
<input type="number" id="precio" placeholder="Precio">
<button onclick="agregarProducto()">Agregar</button>

<br><br>

<table border="1">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio</th> 
            <th>Vender</th>
            <th>+Stock</th>
            <th>Eliminar</th>
        </tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>

<script>
let inventario = JSON.parse(localStorage.getItem("inventario")) || [];

function guardar() {
    localStorage.setItem("inventario", JSON.stringify(inventario));
}

function mostrar() {
    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    inventario.forEach((item, index) => {
        tabla.innerHTML += `
        <tr>
            <td>${item.producto}</td>
            <td>${item.cantidad}</td>
            <td>$${item.precio}</td>
            <td><button onclick="vender(${index})">Vender</button></td>
            <td><button onclick="rellenar(${index})">+Stock</button></td>
            <td><button onclick="eliminar(${index})">X</button></td>
        </tr>
        `;
    });
}

function agregarProducto() {
    let producto = document.getElementById("producto").value;
    let cantidad = document.getElementById("cantidad").value;
    let precio = document.getElementById("precio").value;

    if (producto === "" || cantidad === "" || precio === "") {
        alert("Llena todos los campos");
        return;
    }

    inventario.push({ producto, cantidad, precio });
    guardar();
    mostrar();

    document.getElementById("producto").value = "";
    document.getElementById("cantidad").value = "";
    document.getElementById("precio").value = "";
}

function eliminar(index) {
    inventario.splice(index, 1);
    guardar();
    mostrar();
}

function vender(index) { 
    if (inventario[index].cantidad > 0) {
        inventario[index].cantidad--;
        guardar();
        mostrar();
    } else {
        alert("Ya no hay stock");
    }
}
 function rellenar(index) {
     let cantidadExtra = prompt("¿Cuanto quieres agregar?");
     if (cantidadExtra !== null && cantidadExtra !== "") {
        inventario[index].cantidad =
        parseInt(inventario[index].cantidad) + parseInt(cantidadExtra);
         guardar();
         mostrar();
     }
 }
</script>

</body>
</html>
